<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D4E37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="800" height="400" fill="url(#sky)"/>
  
  <!-- Mountains -->
  <polygon points="0,400 200,100 400,400" fill="url(#mountain)"/>
  <polygon points="300,400 500,150 700,400" fill="#6B5D54"/>
  <polygon points="600,400 800,200 800,400" fill="url(#mountain)"/>
  
  <!-- Snow caps -->
  <polygon points="150,150 200,100 250,150" fill="white"/>
  <polygon points="450,200 500,150 550,200" fill="white"/>
  <polygon points="750,250 800,200 800,250" fill="white"/>
  
  <!-- Simple climber figure -->
  <circle cx="200" cy="80" r="5" fill="#FF6B6B"/>
  <line x1="200" y1="85" x2="200" y2="100" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="200" y1="90" x2="195" y2="95" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="200" y1="90" x2="205" y2="95" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="200" y1="100" x2="195" y2="110" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="200" y1="100" x2="205" y2="110" stroke="#FF6B6B" stroke-width="2"/>
</svg>
